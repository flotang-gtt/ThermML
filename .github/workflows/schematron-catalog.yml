name: Schematron Catalog

on:
  push:
    branches:
      - master
      - schema-validation-generated-xml
  pull_request:

jobs:
  catalog-freshness:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Verify generated Schematron catalog is current
        run: uv run ./schematron/generate_catalog.py --fail-on-change