<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ThermML Rule Catalog</title>
  <link rel="stylesheet" href="assets/catalog.css">
</head>
<body class="catalog-page">
  <main class="catalog-shell">
    <header class="hero">
      <h1>ThermML Rule Catalog</h1>
      <p class="hero-copy">This page renders the ThermML Schematron rules in a catalog format. The catalog is auto-generated from existing rules in the ThermML repository.</p>
    </header>

    <section class="control-panel" aria-label="Catalog filters">
      <label class="field search-field" for="catalog-search">
        <span class="field-label">Filter</span>
        <input id="catalog-search" type="search" placeholder="Filter IDs, families, purpose, or examples">
      </label>

      <fieldset class="field levels-field">
        <legend class="field-label">Levels</legend>
        <div class="toggle-group">
          <label class="toggle-option" for="level-error">
            <input id="level-error" type="checkbox" name="catalog-level" value="error" checked>
            <span>Error</span>
          </label>
          <label class="toggle-option" for="level-warning">
            <input id="level-warning" type="checkbox" name="catalog-level" value="warning" checked>
            <span>Warning</span>
          </label>
        </div>
      </fieldset>

      <div class="actions">
        <button id="catalog-reset" type="button">Reset filters</button>
      </div>
    </section>

    <p class="results-meta">
      <strong id="catalog-result-count"></strong>
      <span id="catalog-active-filters"></span>
    </p>

    <p id="catalog-error" class="catalog-error" hidden></p>

    <fieldset class="column-panel" aria-label="Visible table columns">
      <legend class="field-label">Visible columns</legend>
      <div class="column-options">
        <label class="column-option" for="column-family-toggle">
          <input id="column-family-toggle" type="checkbox" data-column-toggle="family" checked>
          <span>Rule Family</span>
        </label>
        <label class="column-option" for="column-rule-id-toggle">
          <input id="column-rule-id-toggle" type="checkbox" data-column-toggle="rule-id" checked>
          <span>Rule ID</span>
        </label>
        <label class="column-option" for="column-purpose-toggle">
          <input id="column-purpose-toggle" type="checkbox" data-column-toggle="purpose" checked>
          <span>Purpose</span>
        </label>
        <label class="column-option" for="column-level-toggle">
          <input id="column-level-toggle" type="checkbox" data-column-toggle="level" checked>
          <span>Level</span>
        </label>
        <label class="column-option" for="column-source-toggle">
          <input id="column-source-toggle" type="checkbox" data-column-toggle="source" checked>
          <span>Source</span>
        </label>
        <label class="column-option" for="column-examples-toggle">
          <input id="column-examples-toggle" type="checkbox" data-column-toggle="examples" checked>
          <span>Examples</span>
        </label>
      </div>
    </fieldset>

    <div class="table-wrap">
      <table id="catalog-table">
        <colgroup>
          <col data-column="family" class="column-family">
          <col data-column="rule-id" class="column-rule-id">
          <col data-column="purpose" class="column-purpose">
          <col data-column="level" class="column-level">
          <col data-column="source" class="column-source">
          <col data-column="examples" class="column-examples">
        </colgroup>
        <thead>
          <tr>
            <th scope="col" data-column="family">Rule Family</th>
            <th scope="col" data-column="rule-id">Rule ID</th>
            <th scope="col" data-column="purpose">Purpose</th>
            <th scope="col" data-column="level">Level</th>
            <th scope="col" data-column="source">Source</th>
            <th scope="col" data-column="examples">Examples</th>
          </tr>
        </thead>
        <tbody id="catalog-table-body">
          <tr>
            <td colspan="6" class="empty-state">Loading catalog...</td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
  <script>
(() => {
  const catalogTable = document.getElementById("catalog-table");
  const tableBody = document.getElementById("catalog-table-body");
  const resultCount = document.getElementById("catalog-result-count");
  const activeFilters = document.getElementById("catalog-active-filters");
  const errorBanner = document.getElementById("catalog-error");
  const searchInput = document.getElementById("catalog-search");
  const levelInputs = Array.from(document.querySelectorAll('input[name="catalog-level"]'));
  const columnToggles = Array.from(document.querySelectorAll('[data-column-toggle]'));
  const resetButton = document.getElementById("catalog-reset");
  const hiddenColumns = new Set();
  let catalogRows = [];

  function createColumnCell(columnName) {
    const cell = document.createElement("td");
    cell.dataset.column = columnName;
    return cell;
  }

  function syncColumnVisibility() {
    const columnNames = uniqueSorted(
      Array.from(new Set(columnToggles.map((toggle) => toggle.dataset.columnToggle)))
    );

    columnNames.forEach((columnName) => {
      const isHidden = hiddenColumns.has(columnName);
      catalogTable
        .querySelectorAll(`[data-column="${columnName}"]`)
        .forEach((node) => node.classList.toggle("is-hidden", isHidden));

      const toggle = columnToggles.find((entry) => entry.dataset.columnToggle === columnName);
      if (toggle) {
        toggle.checked = !isHidden;
      }
    });
  }

  function uniqueSorted(values) {
    return Array.from(new Set(values)).sort((left, right) =>
      left.localeCompare(right, undefined, { sensitivity: "base" })
    );
  }

  function appendCodeLink(cell, label, href) {
    const code = document.createElement("code");
    const link = document.createElement("a");
    link.href = href;
    link.textContent = label;
    code.append(link);
    cell.append(code);
  }

  function createFamilyCell(row) {
    const cell = createColumnCell("family");
    cell.className = "family-cell";

    const title = document.createElement("strong");
    title.textContent = row.familyName;
    cell.append(title);

    const summary = document.createElement("div");
    summary.className = "family-summary";
    summary.textContent = row.familySummary;
    cell.append(summary);

    return cell;
  }

  function createRuleIdCell(row) {
    const cell = createColumnCell("rule-id");
    appendCodeLink(cell, row.ruleId, row.source.href);
    return cell;
  }

  function createLevelCell(row) {
    const cell = createColumnCell("level");
    const badge = document.createElement("span");
    badge.className = `level-badge level-${row.level}`;
    badge.textContent = row.level;
    cell.append(badge);
    return cell;
  }

  function createExamplesCell(row) {
    const cell = createColumnCell("examples");
    if (!row.examples.length) {
      cell.textContent = "No examples";
      return cell;
    }

    row.examples.forEach((example, index) => {
      appendCodeLink(cell, example.name, example.href);
      if (index < row.examples.length - 1) {
        cell.append(document.createTextNode(", "));
      }
    });
    return cell;
  }

  function renderRows(rows) {
    tableBody.replaceChildren();

    if (!rows.length) {
      const row = document.createElement("tr");
      const cell = document.createElement("td");
      cell.colSpan = 6;
      cell.className = "empty-state";
      cell.textContent = "No rules match the current filters.";
      row.append(cell);
      tableBody.append(row);
      return;
    }

    rows.forEach((entry) => {
      const row = document.createElement("tr");
      row.append(createFamilyCell(entry));
      row.append(createRuleIdCell(entry));

      const purposeCell = createColumnCell("purpose");
      purposeCell.textContent = entry.purpose;
      row.append(purposeCell);

      row.append(createLevelCell(entry));

      const sourceCell = createColumnCell("source");
      appendCodeLink(sourceCell, entry.source.label, entry.source.href);
      row.append(sourceCell);

      row.append(createExamplesCell(entry));
      tableBody.append(row);
    });

    syncColumnVisibility();
  }

  function selectedLevels() {
    return levelInputs.filter((input) => input.checked).map((input) => input.value);
  }

  function buildSearchBlob(row) {
    return [
      row.familyName,
      row.familySummary,
      row.ruleId,
      row.purpose,
      row.level,
      ...row.examples.map((example) => example.name),
    ]
      .join(" ")
      .toLowerCase();
  }

  function activeFilterText(search, levels) {
    const parts = [];
    if (search) {
      parts.push(`search "${search}"`);
    }
    if (levels.length && levels.length < levelInputs.length) {
      parts.push(`levels ${levels.join(" + ")}`);
    }
    return parts.length ? `Active filters: ${parts.join(", ")}.` : "Showing the full catalog.";
  }

  function syncResults(rows, filteredRows, search, levels) {
    resultCount.textContent = `Showing ${filteredRows.length} of ${rows.length} rules.`;
    activeFilters.textContent = activeFilterText(search, levels);
  }

  function applyFilters() {
    const search = searchInput.value.trim().toLowerCase();
    const levels = selectedLevels();

    const filteredRows = catalogRows.filter((row) => {
      if (levels.length && !levels.includes(row.level)) {
        return false;
      }
      if (!levels.length) {
        return false;
      }
      if (search && !buildSearchBlob(row).includes(search)) {
        return false;
      }
      return true;
    });

    renderRows(filteredRows);
    syncResults(catalogRows, filteredRows, searchInput.value.trim(), levels);
  }

  searchInput.addEventListener("input", applyFilters);
  levelInputs.forEach((input) => input.addEventListener("change", applyFilters));
  columnToggles.forEach((toggle) => {
    toggle.addEventListener("change", () => {
      const columnName = toggle.dataset.columnToggle;
      if (toggle.checked) {
        hiddenColumns.delete(columnName);
      } else {
        hiddenColumns.add(columnName);
      }
      syncColumnVisibility();
    });
  });
  resetButton.addEventListener("click", () => {
    searchInput.value = "";
    levelInputs.forEach((input) => {
      input.checked = true;
    });
    hiddenColumns.clear();
    syncColumnVisibility();
    applyFilters();
  });

  async function loadCatalog() {
    try {
      const response = await fetch("./schematron-catalog.json", { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const payload = await response.json();
      catalogRows = Array.isArray(payload.rows) ? payload.rows : [];
      applyFilters();
    } catch (error) {
      errorBanner.hidden = false;
      errorBanner.textContent = `Failed to load schematron-catalog.json: ${error}`;
      tableBody.replaceChildren();
      const row = document.createElement("tr");
      const cell = document.createElement("td");
      cell.colSpan = 6;
      cell.className = "empty-state";
      cell.textContent = "Catalog data could not be loaded.";
      row.append(cell);
      tableBody.append(row);
      resultCount.textContent = "No catalog data loaded.";
      activeFilters.textContent = "";
    }
  }

  loadCatalog();
  syncColumnVisibility();
})();

  </script>
</body>
</html>
